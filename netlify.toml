[build]
  functions = "netlify/functions"
  publish = "."
  command = "echo 'No build command needed'"

[build.environment]
  NODE_VERSION = "18"

# تجاهل فحص secrets في الملفات التالية
# SECRETS_SCAN_OMIT_PATHS (مع حرف s صغير في PATHS)
SECRETS_SCAN_OMIT_PATHS = """
index.html
report.html
"""

[[redirects]]
  from = "/report"
  to = "/report.html"
  status = 200

[[redirects]]
  from = "/report/*"
  to = "/report.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
