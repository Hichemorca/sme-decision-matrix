<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SME Report - Secure Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #07080c;
            color: #e8eaf2;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
        .card {
            background: #111420;
            border: 1px solid #1c2035;
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .decision-word { font-size: 3rem; font-weight: 800; margin: 16px 0; }
        .continue .decision-word { color: #3ddc84; }
        .pivot .decision-word { color: #e8c44a; }
        .exit .decision-word { color: #ff5c5c; }
        .loading { text-align: center; padding: 60px; }
        .error { color: #ff5c5c; text-align: center; padding: 40px; }
        .btn {
            background: #e8c44a;
            color: #07080c;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #252a40;
            color: #7b82a0;
            margin-left: 12px;
        }
        .btn-secondary:hover {
            border-color: #e8c44a;
            color: #e8c44a;
        }
        .flex-buttons { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        hr { border-color: #1c2035; margin: 20px 0; }
        .score-grid { display: flex; gap: 16px; margin: 24px 0; flex-wrap: wrap; }
        .score-card {
            background: #0d0f17;
            border: 1px solid #1c2035;
            border-radius: 12px;
            padding: 16px;
            flex: 1;
            text-align: center;
            min-width: 100px;
        }
        .score-label { font-size: 11px; text-transform: uppercase; color: #5a607a; letter-spacing: 0.06em; }
        .score-value { font-size: 2rem; font-weight: 800; }
        .flag-box {
            background: rgba(232,196,74,0.08);
            border: 1px solid rgba(232,196,74,0.2);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
        }
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1c2035;
        }
        .breakdown-name { font-size: 14px; color: #7b82a0; }
        .breakdown-percent { font-family: 'DM Mono', monospace; font-size: 13px; }
        @media (max-width: 600px) {
            .container { padding: 20px 16px; }
            .card { padding: 20px; }
            .decision-word { font-size: 2rem; }
            .score-value { font-size: 1.5rem; }
        }
        @media print {
            body { background: white; color: black; }
            .card { background: white; border: 1px solid #ccc; }
            .btn { display: none; }
            .score-card { background: #f5f5f5; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loading">🔐 Verifying secure access...</div>
</div>

<script>
    const SUPABASE_URL = 'https://zbssuchvbrjzbotlodim.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpic3N1Y2h2YnJqemJvdGxvZGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODQ0ODYsImV4cCI6MjA5MTU2MDQ4Nn0.ThyXetFWSsUzgbTj4SIeSrPTjC74U3naJhbq-LU960Q';
    const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function verifyAndLoadReport() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        const licenseKey = urlParams.get('license');

        // Case 1: Access via token (from email link)
        if (token && email) {
            await loadByToken(token, email);
            return;
        }
        
        // Case 2: Access via license key (from Gumroad)
        if (licenseKey) {
            await loadByLicense(licenseKey);
            return;
        }
        
        // No valid access method
        document.getElementById('app').innerHTML = `
            <div class="card error">
                <h2>⛔ Access Denied</h2>
                <p>No valid access token or license key provided.</p>
                <a href="/" class="btn">← Return to Home</a>
            </div>`;
    }
    
    async function loadByToken(token, email) {
        try {
            const { data, error } = await sbClient
                .from('assessments')
                .select('*')
                .eq('access_token', token)
                .eq('email', email)
                .single();

            if (error || !data) {
                throw new Error('Invalid or expired token');
            }

            const createdAt = new Date(data.created_at);
            const now = new Date();
            const daysDiff = (now - createdAt) / (1000 * 60 * 60 * 24);
            
            if (daysDiff > 7) {
                document.getElementById('app').innerHTML = `
                    <div class="card error">
                        <h2>⏰ Link Expired</h2>
                        <p>This report link expired after 7 days.</p>
                        <a href="/" class="btn">Start New Assessment →</a>
                    </div>`;
                return;
            }

            displayReport(data.result_data, data.input_data);
            
        } catch (error) {
            document.getElementById('app').innerHTML = `
                <div class="card error">
                    <h2>🔒 Invalid Access</h2>
                    <p>The link is invalid or has expired.</p>
                    <a href="/" class="btn">Return to Home →</a>
                </div>`;
        }
    }
    
    async function loadByLicense(licenseKey) {
        try {
            // Check if license key exists in paid_users
            const { data: paidData, error: paidError } = await sbClient
                .from('paid_users')
                .select('*')
                .eq('license_key', licenseKey)
                .eq('verified', true)
                .single();
                
            if (paidError || !paidData) {
                throw new Error('Invalid license key');
            }
            
            // Check expiration (if set)
            if (paidData.expires_at && new Date(paidData.expires_at) < new Date()) {
                document.getElementById('app').innerHTML = `
                    <div class="card error">
                        <h2>⏰ Access Expired</h2>
                        <p>Your license has expired. Please renew to access your report.</p>
                        <a href="/" class="btn">Return to Home →</a>
                    </div>`;
                return;
            }
            
            // Get the assessment for this user
            const { data: reportData, error: reportError } = await sbClient
                .from('assessments')
                .select('*')
                .eq('email', paidData.email)
                .order('created_at', { ascending: false })
                .limit(1);
                
            if (reportError || !reportData || !reportData.length) {
                document.getElementById('app').innerHTML = `
                    <div class="card error">
                        <h2>📋 No Report Found</h2>
                        <p>Complete the assessment first to generate your report.</p>
                        <a href="/" class="btn">Start Assessment →</a>
                    </div>`;
                return;
            }
            
            displayReport(reportData[0].result_data, reportData[0].input_data);
            
        } catch (error) {
            document.getElementById('app').innerHTML = `
                <div class="card error">
                    <h2>🔒 Invalid License Key</h2>
                    <p>The license key you entered is not valid.</p>
                    <a href="/" class="btn">Return to Home →</a>
                </div>`;
        }
    }

    function displayReport(result, inputData) {
        const dec = result.decision.toLowerCase();
        const companyName = inputData?.company || 'Your Company';
        const industry = inputData?.industry || '';
        const country = inputData?.country || '';
        
        // Generate category breakdown HTML
        const breakdownHTML = result.categories.map(cat => {
            const csPercent = Math.round((cat.cs / 5) * 100);
            const esPercent = Math.round((cat.es / 5) * 100);
            const barColor = cat.cs >= cat.es ? '#3ddc84' : '#ff5c5c';
            return `
                <div class="breakdown-item">
                    <span class="breakdown-name">${cat.name}</span>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 100px; height: 6px; background: #1c2035; border-radius: 3px; overflow: hidden;">
                            <div style="width: ${csPercent}%; height: 100%; background: ${barColor}; border-radius: 3px;"></div>
                        </div>
                        <span class="breakdown-percent">${csPercent}% · ${esPercent}%</span>
                    </div>
                </div>
            `;
        }).join('');
        
        // Generate drivers HTML
        const driversHTML = result.drivers.slice(0, 5).map((dr, idx) => `
            <div style="padding: 12px 0; border-bottom: 1px solid #1c2035;">
                <strong>${idx + 1}. ${dr.name}</strong><br>
                <span style="font-size: 13px; color: #7b82a0;">Continue ${Math.round(dr.cs*10)/10} vs Exit ${Math.round(dr.es*10)/10} (${dr.weight}% weight)</span>
            </div>
        `).join('');
        
        // Generate action plan HTML
        const actions = getActionPlanHTML(result.decision);
        
        // Generate AI analysis
        const aiAnalysis = generateAIAnalysis(result, inputData);
        
        // Generate flags HTML
        const flagsHTML = result.flags && result.flags.length > 0 ? `
            <div class="flag-box">
                <strong>⚠️ Inconsistency Flags Detected</strong>
                <ul style="margin-top: 12px; margin-left: 20px; color: #7b82a0;">
                    ${result.flags.map(f => `<li>${f}</li>`).join('')}
                </ul>
                <p style="font-size: 12px; color: #5a607a; margin-top: 12px;">These flags have reduced the Signal Strength score.</p>
            </div>
        ` : '';
        
        const html = `
            <div class="card ${dec}">
                <div style="color: #5a607a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;">SME SURVIVAL DECISION MATRIX</div>
                <div class="decision-word">${result.decision}</div>
                <p style="color: #7b82a0;">${companyName}${industry ? ' · ' + industry : ''}${country ? ' · ' + country : ''}</p>
                
                <div class="score-grid">
                    <div class="score-card">
                        <div class="score-label">SIGNAL STRENGTH</div>
                        <div class="score-value" style="color: #e8c44a;">${result.confidence}%</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label">CONTINUE POTENTIAL</div>
                        <div class="score-value" style="color: #3ddc84;">${result.continueScore}</div>
                    </div>
                    <div class="score-card">
                        <div class="score-label">EXIT PRESSURE</div>
                        <div class="score-value" style="color: #ff5c5c;">${result.exitScore}</div>
                    </div>
                </div>
                
                <h3 style="margin: 24px 0 12px 0;">📊 Category Breakdown</h3>
                ${breakdownHTML}
                
                ${flagsHTML}
                
                <h3 style="margin: 24px 0 12px 0;">🎯 Top Decision Drivers</h3>
                ${driversHTML}
                
                <h3 style="margin: 24px 0 12px 0;">📋 Recommended Action Plan</h3>
                ${actions}
                
                <h3 style="margin: 24px 0 12px 0;">🤖 AI Strategic Analysis</h3>
                <div style="line-height: 1.8; color: #7b82a0;">${aiAnalysis}</div>
                
                <hr>
                
                <div class="flex-buttons">
                    <button class="btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
                    <button class="btn btn-secondary" onclick="openBookCall()">📅 Book Strategy Session →</button>
                </div>
                
                <p style="margin-top: 24px; font-size: 11px; color: #5a607a; text-align: center;">
                    Report generated on ${new Date().toLocaleDateString()}<br>
                    This report is confidential and for internal use only.
                </p>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
    }
    
    function getActionPlanHTML(decision) {
        if (decision === 'CONTINUE') {
            return `<ul style="margin-left: 20px; color: #7b82a0;">
                <li>📊 Audit non-essential costs, identify 10% savings</li>
                <li>💰 Reduce cash collection cycles</li>
                <li>🎯 Reduce customer concentration risk</li>
                <li>📈 Build 6-month financial model with break-even targets</li>
            </ul>`;
        } else if (decision === 'PIVOT') {
            return `<ul style="margin-left: 20px; color: #7b82a0;">
                <li>⏸️ Freeze non-essential spending immediately</li>
                <li>🎯 Define pivot direction clearly within 7 days</li>
                <li>🧪 Run fast MVP test with 5 real buyers</li>
                <li>📅 Set hard go/no-go decision date by day 75</li>
            </ul>`;
        }
        return `<ul style="margin-left: 20px; color: #7b82a0;">
            <li>🛑 Stop non-essential cash outflows within 48 hours</li>
            <li>📦 Inventory liquid assets for quick conversion</li>
            <li>⚖️ Review exit obligations and legal constraints</li>
            <li>🤝 Open conversations with potential acquirers</li>
        </ul>`;
    }
    
    function generateAIAnalysis(result, inputData) {
        const name = inputData?.company || 'Your business';
        if (result.decision === 'CONTINUE') {
            return `${name} shows strong financial fundamentals and positive market positioning. With ${result.confidence}% confidence score, the data suggests reliable operations and sustainable cash flow. Focus on operational efficiency and customer retention to maintain momentum. Consider expanding successful offerings while monitoring key metrics monthly.`;
        } else if (result.decision === 'PIVOT') {
            return `${name} requires a strategic pivot. While the current model isn't sustainable, your flexibility score indicates a successful transformation is possible within 60-90 days. The market still shows demand signals — redirect your resources toward what works. Test your new direction quickly with real customers and set a firm go/no-go deadline.`;
        }
        return `After analyzing your inputs, an exit recommendation is the most prudent path forward for ${name}. This preserves remaining capital and protects relationships with suppliers and clients. Consider structured options within 30-60 days while you still have negotiating leverage. A well-executed exit can preserve your professional network and reputation for future ventures.`;
    }
    
    function openBookCall() {
        alert('📅 Strategy Session: 60-min call with turnaround expert.\n\nPrice: $399\nIncludes: Full report review + custom 90-day execution plan\n\nContact us at strategy@smesurvival.com to book.');
    }
    
    verifyAndLoadReport();
</script>
</body>
</html>
